<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Test de niveau</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">

  <div class="bg-white p-8 rounded shadow max-w-2xl text-center">
    <h1 class="text-2xl font-bold text-blue-600 mb-6">
      Évaluation de vos connaissances
    </h1>

    <p class="text-gray-700 mb-6">
      Cette étape permet d’évaluer vos connaissances de base en programmation
      (Python et C).  
      Une série de questions vous sera posée afin d’identifier votre niveau
      et vos éventuelles lacunes.
    </p>

    <button id="startTest"
  class="bg-blue-600 text-white px-6 py-3 rounded">
  Commencer le test
</button>

<script>

document.getElementById("startTest").addEventListener("click", async () => {
  const response = await fetch("http://localhost:5000/api/test/start", {
    method: "POST",
    headers: { "Content-Type": "application/json" }
  });

  const data = await response.json();
  console.log("Réponse du serveur :", data);

  console.log("DATA REÇUE:", data);

  // IMPORTANT: ton backend renvoie un ARRAY direct
  const questions = Array.isArray(data) ? data : data.questions;

  localStorage.setItem("currentTest", JSON.stringify(questions));

  window.location.href = "quiz.html";
});
</script>

  </div>

</body>
</html>
