<!DOCTYPE html>
<html lang="fr">

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Connexion - UDBL Learning</title>

  <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-50 min-h-screen flex flex-col">

  <!-- HEADER -->
  <header class="bg-white shadow p-4 flex justify-between items-center relative z-30">

    <!-- Bouton menu -->
    <button id="menuBtn" class="text-2xl text-blue-600 md:hidden">
      ☰
    </button>

    <!-- Logo + titre -->
    <div class="flex items-center">
      <img src="udbl.jpg" alt="Logo" class="w-12 h-12 mr-2">

      <h1 class="text-blue-600 font-bold text-xl">
        UDBL Learning
      </h1>
    </div>

    <!-- Navigation -->
    <nav class="hidden md:block">

      <a href="aceuil.html" class="text-blue-600 mx-2 hover:underline">
        Accueil
      </a>

      <a href="authentification.html" class="text-blue-600 mx-2 hover:underline">
        S'inscrire
      </a>

    </nav>

  </header>

  <!-- CONTENU -->
  <main class="flex-1 flex items-center justify-center p-4">

    <div class="bg-white p-8 rounded shadow-md w-full max-w-md">

      <h2 class="text-2xl font-bold text-blue-600 mb-6 text-center">
        Connexion
      </h2>

      <form id="loginForm" class="space-y-4">

        <!-- Nom utilisateur -->
        <input
          id="name"
          type="text"
          placeholder="Nom d'utilisateur"
          class="w-full p-2 border rounded focus:outline-none focus:ring-2 focus:ring-blue-400"
          required
        >

        <!-- Mot de passe -->
        <input
          id="password"
          type="password"
          placeholder="Mot de passe"
          class="w-full p-2 border rounded focus:outline-none focus:ring-2 focus:ring-blue-400"
          required
        >

        <!-- Remember me -->
        <div class="flex items-center">

          <input
            type="checkbox"
            id="remember"
            class="mr-2"
          >

          <label for="remember" class="text-gray-600 text-sm">
            Se souvenir de moi
          </label>

        </div>

        <!-- Bouton -->
         <div class="flex justify-center">

  <button
    type="submit"
    class="px-6 py-2 bg-gradient-to-r from-blue-500 to-green-500 text-white rounded hover:from-blue-600 hover:to-green-600"
  >
    Se connecter
  </button>
  

</div>
<!-- Séparateur -->

<div class="flex items-center my-4">

  <div class="flex-1 h-px bg-gray-300"></div>

  <span class="px-3 text-gray-500 text-sm">
    ou
  </span>

  <div class="flex-1 h-px bg-gray-300"></div>

</div>

<!-- Bouton Google -->

<button
  type="button"
  id="googleBtn"
  class="w-full flex items-center justify-center gap-3 border border-gray-300 py-2 rounded hover:bg-gray-100 transition"
>

  <!-- Logo Google -->

  <svg
    xmlns="http://www.w3.org/2000/svg"
    viewBox="0 0 48 48"
    class="w-5 h-5"
  >

    <path fill="#FFC107"
      d="M43.6 20.5H42V20H24v8h11.3C33.7 32.7 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3 0 5.7 1.1 7.8 3l5.7-5.7C34.1 6.1 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.7-.4-3.5z"
    />

    <path fill="#FF3D00"
      d="M6.3 14.7l6.6 4.8C14.6 16 18.9 13 24 13c3 0 5.7 1.1 7.8 3l5.7-5.7C34.1 6.1 29.3 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"
    />

    <path fill="#4CAF50"
      d="M24 44c5.2 0 10-2 13.6-5.2l-6.3-5.2c-2 1.5-4.5 2.4-7.3 2.4-5.3 0-9.7-3.3-11.3-8l-6.6 5.1C9.5 39.7 16.2 44 24 44z"
    />

    <path fill="#1976D2"
      d="M43.6 20.5H42V20H24v8h11.3c-1.1 3.1-3.3 5.6-6 7.2l6.3 5.2C39.5 36.7 44 31 44 24c0-1.3-.1-2.7-.4-3.5z"
    />

  </svg>

  <span>
    Continuer avec Google
  </span>

</button>

      </form>

      <!-- Message erreur -->
      <p id="message" class="text-center mt-4 text-red-600 font-semibold"></p>

      <!-- Mot de passe oublié -->
      <p class="text-center mt-4">

        <a href="passeword.html" class="text-blue-600 hover:underline">
          Mot de passe oublié ?
        </a>

      </p>

      <!-- Inscription -->
      <p class="text-center mt-2 text-sm">

        Pas encore de compte ?

        <a href="authentification.html" class="text-blue-500 hover:underline">
          S'inscrire
        </a>

      </p>

    </div>

  </main>

  <!-- SCRIPT -->
  <script>

    document.getElementById("loginForm").addEventListener("submit", async (e) => {

      e.preventDefault();

      const name = document.getElementById("name").value;

      const password = document.getElementById("password").value;

      const response = await fetch("http://localhost:5000/api/login", {

        method: "POST",

        headers: {
          "Content-Type": "application/json"
        },

        body: JSON.stringify({
          name,
          password
        })

      });

      const data = await response.json();

      const messageEl = document.getElementById("message");

      if (!response.ok) {

        messageEl.textContent = data.message;

      } else {

        localStorage.setItem("token", data.token);

        window.location.href =  data.redirect;

      }

    });
    document
  .getElementById("googleBtn")
  .addEventListener("click", () => {

    window.location.href =
      "http://localhost:5000/auth/google";

  });

  </script>

</body>

</html>
