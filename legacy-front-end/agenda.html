<!DOCTYPE html>

<html lang="fr">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Agenda UDBL</title>

<script src="https://cdn.tailwindcss.com"></script>

<link
rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">

<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

</head>

<body class="bg-slate-100">

<div
class="max-w-5xl mx-auto p-8">

<h1
class="text-4xl font-bold text-blue-700">

Planification de vos séances

</h1>

<p
class="text-gray-500 mt-2">

Choisissez les dates auxquelles vous êtes disponible.

</p>

<div
class="mt-8">

<div
class="w-full bg-gray-300 rounded-full h-4">

<div
id="progressBar"
class="bg-blue-600 h-4 rounded-full"
style="width:0%">
</div>

</div>

<p
id="progressText"
class="mt-2 text-sm">

0 séance planifiée

</p>

<div id="sessionsContainer" class="mt-10 space-y-6"></div>

<div class="mt-10">

  <label class="font-semibold">
    Téléphone
  </label>

  <input
    id="phone"
    type="tel"
    placeholder="+243xxxxxxxxx"
    class="w-full mt-2 border rounded-lg p-3"
  >

</div>

<button
  id="saveAgenda"
  class="mt-10 w-full bg-blue-600 hover:bg-blue-700 text-white p-4 rounded-xl text-lg font-bold"
>
  Enregistrer mon agenda
</button>

<script src="agenda.js"></script>

</body>

</html>
