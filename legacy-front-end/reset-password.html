<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Réinitialisation</title>
</head>

<body>

<h2>Nouveau mot de passe</h2>

<input
type="password"
id="password"
placeholder="Nouveau mot de passe"
>

<button id="btn">
Modifier
</button>

<script>

const params =
new URLSearchParams(window.location.search);

const token =
params.get("token");

document
.getElementById("btn")
.addEventListener("click", async () => {

  const newPassword =
  document.getElementById("password").value;

  const response = await fetch(

    "http://localhost:5000/api/password/reset-password",

    {

      method:"POST",

      headers:{
        "Content-Type":"application/json"
      },

      body: JSON.stringify({

        token,
        newPassword

      })

    }

  );

  const data =
  await response.json();

  alert(data.message);

});

</script>

</body>
</html>
