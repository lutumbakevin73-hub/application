<!DOCTYPE html>
<html lang="fr">
<head>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription - UDBL Learning</title>
    <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-50 min-h-screen flex flex-col">

    <!-- HEADER -->
    <header class="bg-white shadow p-4 flex justify-between items-center relative z-30">

        <!-- Bouton menu -->
        <button id="menuBtn" class="text-2xl text-blue-600 md:hidden">
            ☰
        </button>

        <!-- Logo + titre -->
        <div class="flex items-center">
            <img src="udbl.jpg" alt="Logo" class="w-12 h-12 mr-2">
            <h1 class="text-blue-600 font-bold text-xl">UDBL Learning</h1>
        </div>

        <!-- Navigation -->
        <nav class="hidden md:block">
            <a href="aceuil.html" class="text-blue-600 mx-2 hover:underline">
                Accueil
            </a>

            <a href="connexion.html" class="text-blue-600 mx-2 hover:underline">
                connexion
            </a>
        </nav>

    </header>

    <!-- CONTENU -->
    <main class="flex-1 flex items-center justify-center p-4">

        <div class="bg-white p-8 rounded shadow-md w-full max-w-md">

            <h2 class="text-2xl font-bold text-blue-600 mb-6 text-center">
                Inscription
            </h2>

            <form id="registerForm" class="space-y-4">

                <input 
                    id="name"
                    type="text"
                    placeholder="Nom complet"
                    class="w-full p-2 border rounded focus:outline-none focus:ring-2 focus:ring-blue-400"
                    required
                >

                <input 
                    id="email"
                    type="email"
                    placeholder="Adresse e-mail"
                    class="w-full p-2 border rounded focus:outline-none focus:ring-2 focus:ring-blue-400"
                    required
                >

                <input 
                    id="password"
                    type="password"
                    placeholder="Mot de passe"
                    class="w-full p-2 border rounded focus:outline-none focus:ring-2 focus:ring-blue-400"
                    required
                >

                <div class="flex justify-center">

  <button
    type="submit"
    class="px-6 py-2 bg-gradient-to-r from-blue-500 to-green-500 text-white rounded hover:from-blue-600 hover:to-green-600"
  >
    S'inscrire
  </button>

</div>

            </form>

            <p class="text-center mt-2 text-sm">
                Déjà inscrit ?
                <a href="connexion.html" class="text-blue-500 hover:underline">
                    Se connecter
                </a>
            </p>

        </div>

    </main>

</body>

<script>

document.getElementById("registerForm").addEventListener("submit", async (e) => {

    e.preventDefault();

    const username = document.getElementById("name").value;
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    const res = await fetch("http://localhost:5000/api/register", {

        method: "POST",

        headers: {
            "Content-Type": "application/json"
        },

        body: JSON.stringify({
            username,
            email,
            password
        })

    });

    const data = await res.json();

    if (res.ok) {

        localStorage.setItem("token", data.token);

        alert("Inscription réussie !");

        window.location.href = "connexion.html";

    } else {

        alert(data.message || "Erreur");

    }

});

</script>

</html>
